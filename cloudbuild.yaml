steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/solarsail-server:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/solarsail-server:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/solarsail-server:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/solarsail-server:$COMMIT_SHA
      - --location=us-central1
      - --cluster=solarsail-cluster

  # Deploy backend
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'solarsail-server'
      - '--image=gcr.io/$PROJECT_ID/solarsail-server:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars=MONGODB_URI=${MONGODB_URI},JWT_SECRET=${JWT_SECRET},GEMINI_API_KEY=${GEMINI_API_KEY},GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID},CLIENT_URL=${CLIENT_URL},NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/solarsail-server:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/solarsail-server:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'solarsail-server'
